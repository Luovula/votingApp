<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Shortest Path — Proof &amp; Vote</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#1a1a2e;color:#e0d5c1;
  font-family:Georgia,'Times New Roman',serif;
  min-height:100vh;min-height:100dvh;
  -webkit-tap-highlight-color:transparent;
}

/* ── Tabs ── */
.tabs{display:flex;justify-content:center;gap:0;margin:10px auto 0;max-width:620px}
.tab{
  padding:10px 32px;background:#16162b;border:1px solid #2a2a4a;
  color:#6a6a8a;cursor:pointer;font-family:Georgia,serif;font-size:0.92em;
  transition:all 0.2s;user-select:none;
}
.tab:first-child{border-radius:6px 0 0 6px}
.tab:last-child{border-radius:0 6px 6px 0;border-left:0}
.tab.active{background:#0077BB;color:#fff;border-color:#0099DD}
.tab:hover:not(.active){background:#1e1e3a}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── Proof tab ── */
#proof-tab{padding:8px 12px}
#proof-tab canvas{display:block;border-radius:6px;box-shadow:0 0 30px rgba(0,0,0,0.4);margin:6px auto}
.anim-ctrls{display:flex;gap:12px;margin:8px 0 6px;align-items:center;flex-wrap:wrap;justify-content:center}
.anim-ctrls button{
  background:#2a2a4a;color:#c9b896;border:1px solid #4a4a6a;
  padding:8px 18px;font-family:Georgia,serif;font-size:0.92em;
  border-radius:4px;cursor:pointer;transition:all 0.2s;
}
.anim-ctrls button:hover{background:#3a3a5a;border-color:#6a6a8a}
.anim-ctrls button:disabled{opacity:0.35;cursor:default}
.anim-ctrls button.active{background:#0077BB;border-color:#0099DD;color:#fff}
#step-label{font-size:0.83em;color:#6a6a8a}
#narration{
  max-width:860px;min-height:60px;padding:12px 20px;
  background:#16162b;border-left:3px solid #c9b896;
  font-size:0.98em;line-height:1.6;color:#d4cbb5;
  margin:0 auto 14px;border-radius:0 4px 4px 0;
}
#narration em{color:#e8c86a}
#narration strong{color:#5bc0de}
.tag{
  display:inline-block;background:#2a2a4a;border:1px solid #4a4a6a;
  padding:1px 7px;border-radius:3px;font-size:0.82em;color:#8a9ab5;margin-right:4px;
}

/* ── Vote tab ── */
#vote-tab{padding:12px}
.card{
  background:#16162b;border-radius:10px;padding:22px;
  max-width:620px;margin:0 auto;border:1px solid #2a2a4a;
}
.badge{
  display:inline-block;padding:3px 10px;border-radius:4px;
  font-size:0.72em;font-weight:bold;letter-spacing:1.5px;
  text-transform:uppercase;margin-bottom:14px;
}
.badge.language{background:#33BBEE18;color:#33BBEE;border:1px solid #33BBEE44}
.badge.operational{background:#EE773318;color:#EE7733;border:1px solid #EE773344}
.badge.logical{background:#e8c86a18;color:#e8c86a;border:1px solid #e8c86a44}
.q-num{float:right;color:#4a4a6a;font-size:0.72em;font-weight:normal;padding-top:3px}
.q-text{font-size:1.08em;line-height:1.65;margin-bottom:20px;color:#d4cbb5}
.q-text .blank{
  display:inline-block;border-bottom:2px solid #e8c86a;
  min-width:90px;text-align:center;color:#e8c86a;font-weight:bold;
}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{
  display:flex;align-items:center;
  background:#2a2a4a;border:2px solid #3a3a5a;
  color:#c9b896;padding:14px 16px;border-radius:8px;
  font-family:Georgia,serif;font-size:1em;
  cursor:pointer;transition:all 0.25s;text-align:left;
  -webkit-user-select:none;user-select:none;
}
.opt:active{transform:scale(0.98)}
.opt:hover{background:#3a3a5a;border-color:#5a5a7a}
.opt.selected{background:#0077BB28;border-color:#0077BB;color:#ddeeff}
.opt.correct{background:#009E7328;border-color:#009E73;color:#ccffe8}
.opt.wrong-picked{background:#EE337722;border-color:#EE3377;color:#ffccdd}
.opt.disabled{pointer-events:none;opacity:0.85}
.ltr{
  width:28px;height:28px;border-radius:50%;
  background:#1a1a2e;display:flex;align-items:center;justify-content:center;
  font-weight:bold;font-size:0.82em;margin-right:12px;flex-shrink:0;
  transition:all 0.25s;
}
.opt.selected .ltr{background:#0077BB;color:#fff}
.opt.correct .ltr{background:#009E73;color:#fff}
.opt.wrong-picked .ltr{background:#EE3377;color:#fff}
.voted-msg{text-align:center;padding:10px;margin-top:14px;color:#009E73;font-size:0.92em}
.voted-msg .check{font-size:1.2em}
.hist{margin-top:18px}
.hrow{display:flex;align-items:center;margin-bottom:8px}
.hlbl{width:110px;text-align:right;padding-right:10px;font-size:0.85em;color:#8a7e6b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar-wrap{flex:1;height:30px;background:#1a1a2e;border-radius:5px;overflow:hidden}
.hbar{height:100%;border-radius:5px;transition:width 0.6s cubic-bezier(.25,.8,.25,1)}
.hbar.c0{background:#33BBEE}.hbar.c1{background:#EE7733}.hbar.c2{background:#CC79A7}.hbar.c3{background:#e8c86a}
.hcount{width:45px;text-align:right;font-size:0.85em;color:#6a6a8a;margin-left:8px}
.hpct{width:40px;text-align:right;font-size:0.75em;color:#4a4a6a;margin-left:4px}
.tctrls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:14px auto;max-width:620px}
.tb{
  background:#2a2a4a;color:#c9b896;border:1px solid #4a4a6a;
  padding:10px 16px;border-radius:5px;font-family:Georgia,serif;
  font-size:0.88em;cursor:pointer;transition:all 0.2s;
}
.tb:hover{background:#3a3a5a;border-color:#6a6a8a}
.tb.on{background:#0077BB;color:#fff;border-color:#0099DD}
.tb.danger{border-color:#77333a}.tb.danger:hover{background:#44222a;border-color:#993344}
.tb:disabled{opacity:0.3;cursor:default;pointer-events:none}
.vcount{text-align:center;color:#6a6a8a;font-size:0.88em;margin:10px 0}
.vcount b{color:#c9b896}
.dots{display:flex;justify-content:center;gap:6px;margin:18px 0 4px}
.dot{width:10px;height:10px;border-radius:50%;background:#2a2a4a;border:1px solid #3a3a5a;transition:all 0.3s}
.dot.done{background:#009E73;border-color:#009E73}
.dot.cur{background:#0077BB;border-color:#33BBEE;box-shadow:0 0 6px #0077BB88}
.waiting{text-align:center;padding:50px 20px;color:#6a6a8a;font-style:italic;font-size:1.05em}
.waiting .pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:#0077BB;margin-left:6px;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
.banner{text-align:center;padding:8px 14px;margin:0 auto 12px;max-width:620px;border-radius:6px;font-size:0.8em;background:#e8c86a18;color:#e8c86a;border:1px solid #e8c86a33}
.conn{font-size:0.72em;text-align:center;margin-bottom:8px}
.conn .live{color:#009E73}.conn .off{color:#EE3377}
.ftr{text-align:center;margin-top:24px;padding-bottom:16px;font-size:0.78em;color:#2a2a4a}
.ftr a{color:#4a4a6a;text-decoration:none}.ftr a:hover{color:#6a6a8a}

@media(min-width:500px){
  .card{padding:28px}
  .q-text{font-size:1.15em}
  .opt{padding:16px 20px}
}
</style>
</head>
<body>

<!-- ═══ TAB BAR ═══ -->
<div class="tabs" id="tab-bar">
  <div class="tab active" onclick="switchTab('proof')">Proof</div>
  <div class="tab" onclick="switchTab('vote')">Vote</div>
</div>

<!-- ═══════════════════════════════════════════ -->
<!--  PROOF TAB — animated Euclid construction  -->
<!-- ═══════════════════════════════════════════ -->
<div id="proof-tab" class="tab-panel active">
  <canvas id="anim-canvas"></canvas>
  <div class="anim-ctrls">
    <button id="btnPrev" onclick="animPrev()">&#9664; Back</button>
    <span id="step-label"></span>
    <button id="btnNext" onclick="animNext()">Next &#9654;</button>
    <button id="btnAuto" onclick="animToggleAuto()">&#9654; Play</button>
  </div>
  <div id="narration"></div>
</div>

<!-- ═══════════════════════════════════════════ -->
<!--  VOTE TAB — concept questions              -->
<!-- ═══════════════════════════════════════════ -->
<div id="vote-tab" class="tab-panel">
  <div id="vote-app"></div>
  <div class="ftr" id="ftr">
    <a href="?t=1" id="teacher-link">Teacher mode</a>
  </div>
</div>

<!-- ═══ TAB SWITCHING ═══ -->
<script>
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(name + '-tab').classList.add('active');
  document.querySelectorAll('.tab')[name === 'proof' ? 0 : 1].classList.add('active');
  if (name === 'proof' && typeof animResize === 'function') animResize();
}
</script>

<!-- ═══════════════════════════════════════════ -->
<!--  ANIMATION SCRIPT                          -->
<!-- ═══════════════════════════════════════════ -->
<script>
(function(){
const canvas = document.getElementById('anim-canvas');
const ctx = canvas.getContext('2d');

if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
    r = typeof r === 'number' ? r : 0;
    this.moveTo(x+r,y); this.arcTo(x+w,y,x+w,y+h,r); this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r); this.arcTo(x,y,x+w,y,r); this.closePath();
  };
}

let W, H, sc;
function resize() {
  const container = document.getElementById('proof-tab');
  if (!container.classList.contains('active')) return;
  W = Math.min(window.innerWidth - 24, 880);
  H = Math.round(W * 0.72);
  canvas.width = W * 2; canvas.height = H * 2;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  sc = 2;
  draw();
}
window.addEventListener('resize', resize);
window.animResize = resize;

function geo() {
  const w = W, h = H;
  const lineY = h * 0.52;
  const pX = w * 0.5, a = h * 0.22, pY = lineY - a;
  const fX = pX, fY = lineY, pPrimeX = pX, pPrimeY = lineY + a;
  const dX = pX + 0.35 * a, dY = lineY + 0.55 * a;
  const r = Math.sqrt((dX-pX)*(dX-pX)+(dY-pY)*(dY-pY));
  const halfChord = Math.sqrt(r*r - a*a);
  const gX = pX - halfChord, eX = pX + halfChord;
  const qX = pX + 1.4*a, qY = lineY;
  const dx = qX-pX, dy = qY-pY, len = Math.sqrt(dx*dx+dy*dy);
  const rPtX = pX + (dx/len)*a, rPtY = pY + (dy/len)*a;
  return {w,h,lineY,pX,pY,fX,fY,a,pPrimeX,pPrimeY,dX,dY,r,gX,eX,qX,qY,rPtX,rPtY};
}

const C = {
  bg:'#1a1a2e',line:'#8a7e6b',point:'#CC79A7',pPrime:'#D896B9',
  perp:'#0077BB',tangentCircle:'#0077BB',bigCircle:'#33BBEE',
  vesica:'#33BBEE',ge:'#33BBEE',d:'#33BBEE',f:'#0077BB',
  q:'#EE3377',r:'#e8c86a',outside:'#EE7733',dim:'#5a5a7a',gold:'#e8c86a',text:'#c9b896',
};

const steps = [
  {n:'<span class="tag">The Question</span> A point <strong>P</strong> and a line <strong>\u2113</strong>. <em>What is the shortest path from P to \u2113?</em><br><br>We will answer it using only Euclid: a compass, a straightedge, and the propositions of Books I and III.'},
  {n:'<span class="tag">Step 1</span> Take any point <strong>D</strong> on the <em>far side</em> of \u2113 from P. It does not matter where \u2014 D\'s only job is to give us a length to set our compass.'},
  {n:'<span class="tag">Step 2</span> <span class="tag">Post. III</span> Draw a circle centered at <strong>P</strong> with radius <strong>PD</strong>. Because D was chosen on the far side, this circle reaches across \u2113 and crosses it at two points: <strong>G</strong> and <strong>E</strong>.'},
  {n:'<span class="tag">Step 3</span> Now draw <em>two more circles</em>: one centered at <strong>G</strong> with radius <strong>GP</strong>, one centered at <strong>E</strong> with radius <strong>EP</strong>. Both new circles have the same radius as the original (PG = PE = PD, all radii of the first circle).'},
  {n:'<span class="tag">Step 4</span> The two new circles meet at <em>two</em> points. One is <strong>P</strong> itself. The other is a new point <strong>P\u2032</strong> on the opposite side of \u2113.<br><br>Both P and P\u2032 are equidistant from G and E.'},
  {n:'<span class="tag">Step 5</span> Draw the straight line through <strong>P</strong> and <strong>P\u2032</strong>. Where this line crosses \u2113, call the meeting point <strong>F</strong>. F must be the <em>midpoint</em> of GE.'},
  {n:'<span class="tag">Step 6</span> <span class="tag">Prop. III.3</span> <em>\u201CIn a circle, a straight line through the centre that bisects a chord cuts it at right angles.\u201D</em><br><br>GE is a chord. PF passes through centre P and bisects GE at F. So <strong>PF is perpendicular to \u2113</strong>.'},
  {n:'<span class="tag">Step 7</span> <span class="tag">Post. III</span> Draw a <em>new</em> circle: centre <strong>P</strong>, radius <strong>PF</strong>. <em>The construction circles fade away \u2014 we focus on this new circle.</em>'},
  {n:'<span class="tag">Step 8</span> <span class="tag">Prop. III.16</span> Since PF \u22A5 \u2113 at F, and PF is a radius, \u2113 is <em>tangent</em> to this circle at F. Every other point on \u2113 lies <strong>outside</strong>.'},
  {n:'<span class="tag">Step 9</span> Take any other point <strong>Q</strong> on \u2113, with Q \u2260 F. By III.16, Q lies outside the small circle.'},
  {n:'<span class="tag">Step 10</span> Draw PQ. P is inside, Q is outside, so PQ crosses the circle at <strong>R</strong>.<br><strong>PR = PF</strong> (both radii).'},
  {n:'<span class="tag">Step 11</span> <span class="tag">C.N. 5</span> <em>\u201CThe whole is greater than the part.\u201D</em><br>PQ &gt; PR = PF. The perpendicular <strong>PF is the shortest path</strong>. <strong>\u220E</strong>'},
];

let cur=0, anim=1, animId=null, autoPlay=false, autoTmr=null;
function ease(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}

function pt(x,y,r,color,alpha,label,lx,ly){
  ctx.save();ctx.globalAlpha=alpha;
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1.2;ctx.stroke();
  if(label){ctx.font='bold 14px Georgia';ctx.fillStyle=color;ctx.textAlign='left';ctx.fillText(label,x+(lx||10),y+(ly||-10));}
  ctx.restore();
}
function dashed(x1,y1,x2,y2,color,alpha,lw){
  ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle=color;ctx.lineWidth=lw||1.2;ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.setLineDash([]);ctx.restore();
}
function solid(x1,y1,x2,y2,color,alpha,lw){
  ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle=color;ctx.lineWidth=lw||1.5;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore();
}
function arcS(cx,cy,r,s,e,color,alpha,lw,dash){
  ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle=color;ctx.lineWidth=lw||2;
  if(dash)ctx.setLineDash(dash);ctx.beginPath();ctx.arc(cx,cy,r,s,e);ctx.stroke();
  if(dash)ctx.setLineDash([]);ctx.restore();
}
function ra(x,y,sz,color,alpha){
  ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle=color;ctx.lineWidth=1.4;
  ctx.beginPath();ctx.moveTo(x+sz,y);ctx.lineTo(x+sz,y-sz);ctx.lineTo(x,y-sz);ctx.stroke();ctx.restore();
}
function txt(str,x,y,color,alpha,font,align){
  ctx.save();ctx.globalAlpha=alpha;ctx.font=font||'14px Georgia';ctx.fillStyle=color||C.text;ctx.textAlign=align||'left';
  ctx.fillText(str,x,y);ctx.restore();
}

function cFade(){if(cur<7)return 1;if(cur===7)return Math.max(0,1-ease(Math.min(anim,1)));return 0;}

function draw(){
  if(!W)return;
  ctx.setTransform(sc,0,0,sc,0,0);
  const g=geo(),t=ease(Math.min(anim,1)),cf=cFade();
  ctx.fillStyle=C.bg;ctx.fillRect(0,0,g.w,g.h);

  {const a0=cur===0?Math.min(t*1.5,1):1,ext=cur===0?Math.min(t*1.3,1):1;
   const lx1=g.pX-g.w*0.46*ext,lx2=g.pX+g.w*0.46*ext;
   solid(lx1,g.lineY,lx2,g.lineY,C.line,a0,2);
   if(ext>0.7)txt('\u2113',lx2+12,g.lineY-8,C.line,a0,'italic 16px Georgia');}
  pt(g.pX,g.pY,6,C.point,1,'P',12,-8);

  if(cur>=1&&cf>0){const a1=cur===1?t:cf;pt(g.dX,g.dY,4,C.d,a1,'D',8,14);
    if(cur===1)txt('"on the far side"',g.dX+16,g.dY+4,C.dim,a1*0.7,'italic 11px Georgia');}

  if(cur>=2&&cf>0){const a2=cur===2?t:cf,sw=cur===2?t*Math.PI*2:Math.PI*2;
    if(cur===2)dashed(g.pX,g.pY,g.dX,g.dY,C.bigCircle,a2*0.4,1);
    arcS(g.pX,g.pY,g.r,-Math.PI/2,-Math.PI/2+sw,C.bigCircle,a2*0.55,1.6,[6,5]);
    if(cur===2?t>0.55:true){const ga=cur===2?Math.min((t-0.55)/0.45,1):cf;
      pt(g.gX,g.lineY,4,C.ge,ga,'G',-18,16);pt(g.eX,g.lineY,4,C.ge,ga,'E',8,16);}}

  if(cur>=3&&cf>0){const a3=cur===3?t:cf,sw=cur===3?t*Math.PI*2:Math.PI*2;
    arcS(g.gX,g.lineY,g.r,-Math.PI/2,-Math.PI/2+sw,C.vesica,a3*0.55,1.6,[6,5]);
    arcS(g.eX,g.lineY,g.r,-Math.PI/2,-Math.PI/2+sw,C.vesica,a3*0.55,1.6,[6,5]);
    if(cur===3){dashed(g.gX,g.lineY,g.pX,g.pY,C.vesica,a3*0.4,1);dashed(g.eX,g.lineY,g.pX,g.pY,C.vesica,a3*0.4,1);}}

  if(cur>=4&&cf>0){const a4=cur===4?t:cf;pt(g.pPrimeX,g.pPrimeY,5,C.pPrime,a4,"P'",10,16);
    if(cur===4){ctx.save();ctx.globalAlpha=a4*0.4;ctx.strokeStyle=C.gold;ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
      ctx.beginPath();ctx.arc(g.pX,g.pY,13,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.arc(g.pPrimeX,g.pPrimeY,13,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.restore();}}

  if(cur>=5){if(cf>0)solid(g.pX,g.pY,g.pPrimeX,g.pPrimeY,C.gold,(cur===5?t:cf)*0.85,2);
    const a5=cur===5?t:1;pt(g.fX,g.fY,5,C.f,a5,'F',-18,16);
    if(cur===5&&t>0.5){const ta=(t-0.5)/0.5;ctx.save();ctx.globalAlpha=ta*0.85;ctx.strokeStyle=C.gold;ctx.lineWidth=1.4;
      for(const mx of [(g.gX+g.fX)/2,(g.fX+g.eX)/2]){ctx.beginPath();ctx.moveTo(mx-2,g.lineY-5);ctx.lineTo(mx-2,g.lineY+5);ctx.stroke();
        ctx.beginPath();ctx.moveTo(mx+2,g.lineY-5);ctx.lineTo(mx+2,g.lineY+5);ctx.stroke();}ctx.restore();}}

  if(cur>=6){const a6=cur===6?t:1;solid(g.pX,g.pY,g.fX,g.fY,C.perp,a6,2.6);ra(g.fX,g.fY,10,C.perp,a6);
    txt('a',g.fX-18,(g.pY+g.fY)/2+4,C.gold,a6,'bold italic 16px Georgia');
    if(cur===6&&t>0.3){const ba=Math.min((t-0.3)/0.4,1);ctx.save();ctx.globalAlpha=ba;
      const px=g.w*0.62,py=g.h*0.04,pw=g.w*0.36,ph=50;
      ctx.fillStyle='rgba(26,26,46,0.94)';ctx.strokeStyle=C.perp;ctx.lineWidth=1.2;
      ctx.beginPath();ctx.roundRect(px,py,pw,ph,4);ctx.fill();ctx.stroke();
      ctx.font='bold 12px Georgia';ctx.fillStyle='#5bc0de';ctx.textAlign='center';
      ctx.fillText('Prop. III.3',px+pw/2,py+18);ctx.font='italic 11px Georgia';ctx.fillStyle='#d4cbb5';
      ctx.fillText('line through centre + bisects chord',px+pw/2,py+33);
      ctx.fillStyle=C.gold;ctx.font='bold 11px Georgia';ctx.fillText('\u21D2 perpendicular to chord',px+pw/2,py+44);ctx.restore();}}

  if(cur>=7){const a7=cur===7?t:1,sw=cur===7?t*Math.PI*2:Math.PI*2;
    arcS(g.pX,g.pY,g.a,-Math.PI/2,-Math.PI/2+sw,C.tangentCircle,a7*0.95,2.6);}

  if(cur>=8&&cur<=10){const a8=cur===8?t:1;
    if(cur===8){ctx.save();ctx.globalAlpha=a8*0.55;ctx.beginPath();ctx.arc(g.fX,g.fY,14,0,Math.PI*2);
      ctx.strokeStyle=C.gold;ctx.lineWidth=2;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);ctx.restore();
      txt('tangent',g.fX+18,g.fY+26,C.gold,a8*0.85,'italic 12px Georgia');
      for(const mx of [-2.6,-1.6,-0.7,0.7,1.6,2.6]){const mxPx=g.fX+mx*g.a*0.55;if(mxPx<50||mxPx>g.w-50)continue;
        ctx.save();ctx.globalAlpha=a8*0.45;ctx.font='11px Georgia';ctx.fillStyle=C.outside;ctx.textAlign='center';
        ctx.fillText('outside',mxPx,g.lineY-8);ctx.restore();}}}

  if(cur>=9){const a9=cur===9?t:1;pt(g.qX,g.qY,5,C.q,a9,'Q',10,16);
    if(cur===9)txt('outside',g.qX,g.qY-12,C.outside,a9*0.75,'italic 12px Georgia','center');}

  if(cur>=10){const a10=cur===10?t:1;solid(g.pX,g.pY,g.qX,g.qY,C.q,a10*0.65,1.8);
    if(a10>0.25){const sa=Math.min((a10-0.25)/0.4,1);solid(g.pX,g.pY,g.rPtX,g.rPtY,C.r,sa*0.95,2.6);
      solid(g.rPtX,g.rPtY,g.qX,g.qY,C.q,sa*0.45,1.5);}
    pt(g.rPtX,g.rPtY,5,C.r,a10,'R',-8,-12);
    if(cur===10&&t>0.55){const ba=Math.min((t-0.55)/0.4,1);ctx.save();ctx.globalAlpha=ba;
      const px=g.w*0.62,py=g.h*0.04,pw=g.w*0.36,ph=48;
      ctx.fillStyle='rgba(26,26,46,0.94)';ctx.strokeStyle=C.r;ctx.lineWidth=1.2;
      ctx.beginPath();ctx.roundRect(px,py,pw,ph,4);ctx.fill();ctx.stroke();
      ctx.font='bold 12px Georgia';ctx.fillStyle=C.gold;ctx.textAlign='center';
      ctx.fillText('PR = PF (both radii)',px+pw/2,py+20);ctx.font='11px Georgia';ctx.fillStyle='#d4cbb5';
      ctx.fillText('R lies between P and Q on segment PQ',px+pw/2,py+36);ctx.restore();}
    pt(g.qX,g.qY,5,C.q,1,'Q',10,16);pt(g.rPtX,g.rPtY,5,C.r,1,'R',-8,-12);}

  if(cur>=11){const a11=cur===11?t:1;
    const pulse=0.5+0.5*Math.sin(Date.now()/400);
    ctx.save();ctx.globalAlpha=a11*pulse*0.25;ctx.strokeStyle=C.tangentCircle;ctx.lineWidth=10;
    ctx.beginPath();ctx.arc(g.pX,g.pY,g.a,0,Math.PI*2);ctx.stroke();ctx.restore();
    arcS(g.pX,g.pY,g.a,0,Math.PI*2,C.tangentCircle,a11,3);
    solid(g.pX,g.pY,g.fX,g.fY,C.perp,a11,3);ra(g.fX,g.fY,11,C.perp,a11);
    ctx.save();ctx.globalAlpha=a11;const px=g.w*0.02,py=g.lineY+14;
    ctx.font='bold 12px Georgia';ctx.fillStyle='#5bc0de';ctx.textAlign='left';
    ctx.fillText('THE COMPLETE PROOF',px+14,py+20);ctx.font='12px Georgia';ctx.fillStyle='#d4cbb5';
    const lh=17;let row=py+40;
    ctx.fillText('1. Circle at P, radius PD \u2192 meets \u2113 at G, E',px+14,row);row+=lh;
    ctx.fillText('2. Circles at G (rad. GP) and E (rad. EP) \u2192 meet at P, P\u2032',px+14,row);row+=lh;
    ctx.fillText('3. Line PP\u2032 crosses \u2113 at F, the midpoint of GE',px+14,row);row+=lh;
    ctx.fillText('4. PF \u22A5 \u2113   (III.3 \u2014 line through centre bisecting chord)',px+14,row);row+=lh;
    ctx.fillText('5. Circle at P, radius PF \u2192 \u2113 is tangent at F  (III.16)',px+14,row);row+=lh;
    ctx.fillText('6. Any Q \u2260 F on \u2113 is outside; PQ meets circle at R',px+14,row);row+=lh;
    ctx.font='bold 12px Georgia';ctx.fillStyle=C.perp;
    ctx.fillText('7. PQ > PR = PF   (C.N. 5)          \u220E',px+14,row);ctx.restore();
    txt('shortest',g.fX+12,g.fY-g.a*0.45,C.perp,a11,'bold 13px Georgia');}

  pt(g.pX,g.pY,6,C.point,1,'P',12,-8);
  if(cur>=5)pt(g.fX,g.fY,5,C.f,1,'F',-18,16);
  if(cur===11)requestAnimationFrame(draw);
}

function go(s){cur=Math.max(0,Math.min(s,steps.length-1));anim=0;updateUI();animateIn();}
function next(){if(cur<steps.length-1)go(cur+1);}
function prev(){if(cur>0)go(cur-1);stopAuto();}
function animateIn(){if(animId)cancelAnimationFrame(animId);const start=performance.now();
  function tick(now){anim=Math.min((now-start)/1300,1);draw();if(anim<1)animId=requestAnimationFrame(tick);}
  animId=requestAnimationFrame(tick);}
function updateUI(){
  document.getElementById('step-label').textContent=`Step ${cur+1} of ${steps.length}`;
  document.getElementById('narration').innerHTML=steps[cur].n;
  document.getElementById('btnPrev').disabled=cur===0;
  document.getElementById('btnNext').disabled=cur===steps.length-1;}
function toggleAuto(){if(autoPlay){stopAuto();}else{autoPlay=true;
  document.getElementById('btnAuto').textContent='\u23F8 Pause';document.getElementById('btnAuto').classList.add('active');
  (function adv(){if(!autoPlay)return;if(cur<steps.length-1){next();autoTmr=setTimeout(adv,4500);}else stopAuto();})();}}
function stopAuto(){autoPlay=false;if(autoTmr)clearTimeout(autoTmr);
  document.getElementById('btnAuto').textContent='\u25B6 Play';document.getElementById('btnAuto').classList.remove('active');}

document.addEventListener('keydown',e=>{
  if(!document.getElementById('proof-tab').classList.contains('active'))return;
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();}
  if(e.key==='ArrowLeft'){e.preventDefault();prev();}});

window.animNext=next; window.animPrev=prev; window.animToggleAuto=toggleAuto;
resize(); go(0);
})();
</script>

<!--  VOTING SCRIPT                             -->
<!-- ═══════════════════════════════════════════ -->
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL = 'https://eoozcdtnxpzlzgcuembv.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_XOjJBpQpxAUGFc8bjtR3qA_DUTFzrRe';

const questions = [
  {cat:'language',label:'VOCABULARY',text:'A <span class="blank">___</span> is a straight line from the centre of a circle to its edge.',options:['radius','diameter','chord','tangent'],correct:0},
  {cat:'language',label:'VOCABULARY',text:'A line that touches a circle at exactly one point is called a <span class="blank">___</span>.',options:['chord','tangent','radius','parallel line'],correct:1},
  {cat:'language',label:'VOCABULARY',text:'Two lines that meet at a 90\u00B0 angle are called <span class="blank">___</span>.',options:['parallel','diagonal','perpendicular','horizontal'],correct:2},
  {cat:'operational',label:'WHAT HAPPENS',text:'In the construction, why does the first circle cross line \u2113?',options:['Because P is on line \u2113','Because D is on the far side of \u2113 from P','Because the circle is very small','Because \u2113 is curved'],correct:1},
  {cat:'operational',label:'WHAT HAPPENS',text:'We draw two more circles at G and E. Where do they meet?',options:['Only at point P','At P and at a new point P\u2032 below \u2113','They do not meet','At the centre of line \u2113'],correct:1},
  {cat:'operational',label:'FILL IN THE BLANK',text:'F is the <span class="blank">___</span> of segment GE.',options:['endpoint','midpoint','radius','centre'],correct:1},
  {cat:'operational',label:'WHAT HAPPENS',text:'The small circle has centre P and radius PF. How does line \u2113 meet this circle?',options:['\u2113 cuts through the circle at two points','\u2113 is inside the circle','\u2113 touches the circle at exactly one point (F)','\u2113 does not touch the circle at all'],correct:2},
  {cat:'logical',label:'WHY',text:'PF is perpendicular to \u2113 because\u2026 (Euclid III.3)',options:['PF passes through centre P and bisects chord GE','PF is the longest line from P to \u2113','F is the endpoint of \u2113','All lines from P are perpendicular'],correct:0},
  {cat:'logical',label:'WHY',text:'For any point Q \u2260 F on \u2113, why is PQ longer than PF?',options:['Because Q is always far from P','Because PQ > PR, and PR = PF (both are radii)','Because PF is a diameter','Because \u2113 is the longest line'],correct:1},
  {cat:'logical',label:'WHY',text:'\u201CThe whole is greater than the part.\u201D What is the whole and what is the part?',options:['The big circle is the whole, the small circle is the part','Line \u2113 is the whole, segment PF is the part','Segment PQ is the whole, segment PR is the part','Point P is the whole, point F is the part'],correct:2},
];

const isTeacher = new URLSearchParams(location.search).has('t');
const isLocal = SUPABASE_URL.includes('YOUR-PROJECT');
const letters = ['A','B','C','D'];

let sessionId = sessionStorage.getItem('cvote-sid');
if(!sessionId){sessionId=Math.random().toString(36).slice(2,11);sessionStorage.setItem('cvote-sid',sessionId);}

let myVotes={};
try{myVotes=JSON.parse(localStorage.getItem('cvote-my')||'{}');}catch(e){}
function saveMyVote(qi,choice){myVotes[`q${qi}`]=choice;localStorage.setItem('cvote-my',JSON.stringify(myVotes));}

let sessionState={current_question:0,show_results:false,reveal_answer:false};
let voteCounts=[0,0,0,0],totalVotes=0,connected=false;
let localVotes={};

let sb=null;
if(!isLocal)sb=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

async function loadSessionState(){if(isLocal)return;const{data}=await sb.from('session_state').select('*').eq('id',1).single();if(data)sessionState=data;}
async function loadVotes(){
  if(isLocal){const qv=localVotes[`q${sessionState.current_question}`]||{};voteCounts=[0,0,0,0];totalVotes=0;
    for(const c of Object.values(qv)){if(c>=0&&c<4){voteCounts[c]++;totalVotes++;}}return;}
  const{data}=await sb.from('votes').select('choice').eq('question_index',sessionState.current_question);
  voteCounts=[0,0,0,0];totalVotes=0;for(const row of(data||[])){if(row.choice>=0&&row.choice<4){voteCounts[row.choice]++;totalVotes++;}}}
async function fullRefresh(){await loadSessionState();await loadVotes();render();}

async function submitVote(qi,choice){saveMyVote(qi,choice);
  if(isLocal){if(!localVotes[`q${qi}`])localVotes[`q${qi}`]={};localVotes[`q${qi}`][sessionId]=choice;await loadVotes();render();return;}
  await sb.from('votes').upsert({voter_id:sessionId,question_index:qi,choice:choice});}
async function setCurrent(i){
  if(isLocal){sessionState={...sessionState,current_question:i,show_results:false,reveal_answer:false};await loadVotes();render();return;}
  await sb.from('session_state').update({current_question:i,show_results:false,reveal_answer:false}).eq('id',1);}
async function setShowResults(v){if(isLocal){sessionState.show_results=v;render();return;}await sb.from('session_state').update({show_results:v}).eq('id',1);}
async function setRevealAnswer(v){if(isLocal){sessionState.reveal_answer=v;render();return;}await sb.from('session_state').update({reveal_answer:v}).eq('id',1);}
async function resetAll(){myVotes={};localStorage.setItem('cvote-my','{}');
  if(isLocal){sessionState={current_question:0,show_results:false,reveal_answer:false};localVotes={};await loadVotes();render();return;}
  await sb.from('votes').delete().neq('voter_id','');await sb.from('session_state').update({current_question:0,show_results:false,reveal_answer:false}).eq('id',1);}

function subscribeRealtime(){if(isLocal)return;
  sb.channel('live')
    .on('postgres_changes',{event:'*',schema:'public',table:'session_state'},(p)=>{if(p.new){sessionState=p.new;loadVotes().then(render);}})
    .on('postgres_changes',{event:'*',schema:'public',table:'votes'},(p)=>{if(p.new&&p.new.question_index===sessionState.current_question)loadVotes().then(render);})
    .subscribe((status)=>{connected=(status==='SUBSCRIBED');render();});}

const $app=document.getElementById('vote-app');

function render(){
  const qi=sessionState.current_question||0,q=questions[qi];
  const showRes=!!sessionState.show_results,revealAns=!!sessionState.reveal_answer;
  const myChoice=myVotes[`q${qi}`],hasVoted=myChoice!==undefined;
  let h='';

  if(isLocal)h+='<div class="banner">Demo mode \u2014 paste Supabase credentials to enable multi-device voting</div>';
  else if(!connected)h+='<div class="conn"><span class="off">\u25CF</span> connecting\u2026</div>';
  else h+='<div class="conn"><span class="live">\u25CF</span> live</div>';

  if(isTeacher){h+='<div class="tctrls">';
    h+=`<button class="tb" onclick="window._goPrev()" ${qi===0?'disabled':''}>&#9664; Prev</button>`;
    h+=`<button class="tb${showRes?' on':''}" onclick="window._toggleResults()">${showRes?'Hide results':'Show results'}</button>`;
    h+=`<button class="tb${revealAns?' on':''}" onclick="window._toggleReveal()" ${!showRes?'disabled':''}>${revealAns?'Hide answer':'Reveal answer'}</button>`;
    h+=`<button class="tb" onclick="window._goNext()" ${qi>=questions.length-1?'disabled':''}>Next &#9654;</button>`;
    h+='<button class="tb danger" onclick="window._doReset()">Reset</button></div>';
    h+=`<div class="vcount"><b>${totalVotes}</b> vote${totalVotes!==1?'s':''} received</div>`;}

  h+='<div class="card">';
  h+=`<span class="badge ${q.cat}">${q.label}</span><span class="q-num">${qi+1} / ${questions.length}</span>`;
  h+=`<div class="q-text">${q.text}</div>`;

  if(isTeacher&&showRes){const mx=Math.max(...voteCounts,1);h+='<div class="hist">';
    for(let i=0;i<q.options.length;i++){const pct=totalVotes>0?Math.round(voteCounts[i]/totalVotes*100):0;
      const w=totalVotes>0?(voteCounts[i]/mx*100):0;let ls='';
      if(revealAns&&i===q.correct)ls=' style="color:#009E73;font-weight:bold"';
      h+='<div class="hrow">';h+=`<div class="hlbl"${ls}>${revealAns&&i===q.correct?'\u2713 ':''}${letters[i]}) ${q.options[i]}</div>`;
      h+=`<div class="hbar-wrap"><div class="hbar c${i}" style="width:${w}%"></div></div>`;
      h+=`<div class="hcount">${voteCounts[i]}</div><div class="hpct">${pct}%</div></div>`;}
    h+='</div>';
  } else {h+='<div class="opts">';
    for(let i=0;i<q.options.length;i++){let cls='opt';
      if(hasVoted&&!revealAns){cls+=' disabled';if(myChoice===i)cls+=' selected';}
      if(revealAns){cls+=' disabled';if(i===q.correct)cls+=' correct';
        else if(hasVoted&&myChoice===i&&myChoice!==q.correct)cls+=' wrong-picked';
        else if(hasVoted&&myChoice===i)cls+=' selected';}
      h+=`<div class="${cls}" onclick="window._vote(${qi},${i})"><span class="ltr">${letters[i]}</span><span>${q.options[i]}</span></div>`;}
    h+='</div>';if(hasVoted&&!revealAns)h+='<div class="voted-msg"><span class="check">\u2713</span> Vote recorded</div>';}
  h+='</div>';

  h+='<div class="dots">';
  for(let i=0;i<questions.length;i++){let d='dot';if(i<qi)d+=' done';else if(i===qi)d+=' cur';else d+=' upcoming';h+=`<div class="${d}"></div>`;}
  h+='</div>';
  $app.innerHTML=h;
}

window._vote=async(qi,choice)=>{if(myVotes[`q${qi}`]!==undefined)return;await submitVote(qi,choice);};
window._goNext=async()=>{const qi=sessionState.current_question||0;if(qi<questions.length-1)await setCurrent(qi+1);};
window._goPrev=async()=>{const qi=sessionState.current_question||0;if(qi>0)await setCurrent(qi-1);};
window._toggleResults=async()=>{await setShowResults(!sessionState.show_results);};
window._toggleReveal=async()=>{await setRevealAnswer(!sessionState.reveal_answer);};
window._doReset=async()=>{if(!confirm('Reset all votes and go back to question 1?'))return;await resetAll();};

(async function start(){
  if(isTeacher)document.getElementById('ftr').innerHTML='<span style="color:#4a4a6a">Teacher mode</span>';
  await fullRefresh();subscribeRealtime();setInterval(fullRefresh,5000);
})();
</script>
